{% extends "base.html" %}
{% block title %}Add Snippet — CodeVault{% endblock %}
{% block content %}

<div class="page-header">
  <h1>NEW SNIPPET</h1>
  <p>Store a new code snippet in the vault</p>
</div>

<div class="card" style="max-width:760px">
  <form method="POST" action="{{ url_for('add_snippet') }}" id="add-snippet-form">
    <div class="form-group">
      <label for="title">SNIPPET TITLE</label>
      <input type="text" id="title" name="title" placeholder="e.g. Binary Search Implementation" required/>
    </div>
    <div class="form-group">
      <label for="language">PROGRAMMING LANGUAGE</label>
      <select id="language" name="language" required>
        <option value="">-- SELECT LANGUAGE --</option>
        <option value="Python">Python</option>
        <option value="JavaScript">JavaScript</option>
        <option value="Java">Java</option>
        <option value="C++">C++</option>
        <option value="C">C</option>
        <option value="TypeScript">TypeScript</option>
        <option value="Go">Go</option>
        <option value="Rust">Rust</option>
        <option value="Bash">Bash</option>
        <option value="SQL">SQL</option>
        <option value="HTML">HTML</option>
        <option value="CSS">CSS</option>
        <option value="Other">Other</option>
      </select>
    </div>
    <div class="form-group">
      <label for="description">DESCRIPTION <span style="color:var(--muted)">(optional)</span></label>
      <input type="text" id="description" name="description" placeholder="Brief description of what this snippet does"/>
    </div>
    <div class="form-group">
      <label for="code">CODE</label>
      <textarea id="code" name="code" placeholder="# paste your code here..." required rows="12"></textarea>
    </div>
    <div style="display:flex; gap:1rem">
      <button type="submit" class="btn btn-primary" id="save-btn">SAVE TO VAULT</button>
      <a href="{{ url_for('index') }}" class="btn btn-secondary" id="cancel-btn">CANCEL</a>
    </div>
  </form>
</div>

{% endblock %}
